<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved HTML Structure</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            margin: 10px;
        }
        nav a {
            color: #ffffff;
            padding: 10px;
            text-decoration: none;
        }
        article {
            padding: 20px;
            background: #ffffff;
            margin: 15px;
            border-radius: 5px;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #35424a;
            color: #ffffff;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Improved Web Page</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <article>
        <h2>About This Page</h2>
        <p>This page has been improved for better semantics and structure. The content is styled for a clean layout.</p>
    </article>
    <footer>
        <p>&copy; 2026 hamzaalastaalhussini. All rights reserved.</p>
    </footer>
</body>
</html>
